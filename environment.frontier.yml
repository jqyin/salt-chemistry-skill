name: openmm-torch-frontier
# Conda environment for the OpenMM + MACE stack on OLCF Frontier (AMD MI250X / ROCm).
# Created automatically by templates/frontier_env.sh on first use, or manually:
#   conda env create -f environment.frontier.yml
#
# The pip section pulls PyTorch from the ROCm wheel index; if OLCF bumps the ROCm
# module, update the index URL and the torch/torchvision/torchaudio versions to match.
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - numpy
  - scipy
  - pandas
  - matplotlib
  - h5py
  - ase
  - pyyaml
  - tqdm
  - ipykernel
  - jupyterlab
  - networkx
  - sympy
  - opt-einsum
  - pip:
      - --index-url=https://download.pytorch.org/whl/rocm7.1
      - --extra-index-url=https://pypi.org/simple
      - torch==2.10.0
      - torchvision==0.25.0
      - torchaudio==2.10.0
      - mace-torch==0.3.16
      - e3nn==0.4.4
      - torch-ema==0.3
      - torchmetrics
      - lmdb
      - matscipy
      - prettytable
      - orjson
      - python-hostlist
      - openmm[hip7]
      - openmmml
